<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your brief and meaningful description goes here.">
    <meta name="keywords" content="your, keywords, go, here">
    <meta name="author" content="Your Name">
    <meta name="robots" content="index, follow">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Your Name - Your Profession">
    <meta property="og:description" content="Your brief and meaningful description goes here.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.yourwebsite.com">
    <meta property="og:image" content="https://www.yourwebsite.com/your-image.jpg">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@yourtwitterhandle">
    <meta name="twitter:title" content="Your Name - Your Profession">
    <meta name="twitter:description" content="Your brief and meaningful description goes here.">
    <meta name="twitter:image" content="https://www.yourwebsite.com/your-image.jpg">

    <title>Your Name - Your Profession</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
            color: #333;
        }

        h1, p {
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.5em;
            color: #555;
        }

        .social {
            margin-top: 20px;
        }

        .social a {
            margin-right: 10px;
            text-decoration: none;
            color: #333;
            font-size: 20px;
            transition: color 0.3s ease-in-out;
        }

        .social a:hover {
            color: #007BFF; /* Change to your preferred hover color */
        }
    </style>
</head>
<body>
    <div>
        <h1>Your Name</h1>
        <p>Your Profession</p>
    </div>

    <div class="social">
        <a href="#" target="_blank">Twitter</a>
        <a href="#" target="_blank">LinkedIn</a>
        <a href="#" target="_blank">GitHub</a>
        <!-- Add more social links as needed -->
    </div>
</body>
</html>
